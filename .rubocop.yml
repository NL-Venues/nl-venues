inherit_from: .rubocop_todo.yml

plugins: rubocop-rspec

AllCops:
  Exclude:
    - 'bin/*'
    - 'node_modules/**/*'
    - 'db/schema.rb'
    - 'vendor/**/*'
    - 'db/migrate/*.better_together.rb'
    - 'worktrees/**/*'
    - 'tmp/**/*'
  NewCops: enable
Style/StringLiterals:
  Exclude:
    - 'db/migrate/*'
